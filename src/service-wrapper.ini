; ============================================================
;  service-wrapper.ini
;  Place this file in the SAME directory as service-wrapper.exe
; ============================================================

[ServiceWrapper]

; ---- Wrapped executable ----------------------------------------
Executable=C:\MyApp\myapp.exe

; Command-line arguments (optional)
Arguments=

; Working directory — leave blank to use the exe directory
WorkingDirectory=C:\MyApp

; ---- Service identity ------------------------------------------
ServiceName=MyWrappedService
DisplayName=My Wrapped Service
Description=Runs MyApp as a managed Windows service via service-wrapper.

; ---- Restart policy --------------------------------------------
; 1 = restart the wrapped exe on non-zero exit code
; 0 = stop the service when the exe exits
RestartOnCrash=1

; Seconds to wait before restarting (ignored if RestartOnCrash=0)
RestartDelaySeconds=5

; ---- Logging ---------------------------------------------------
; UTF-8 log file path (optional — leave blank to disable).
; All messages are also written to Windows Application Event Log.
LogFile=C:\MyApp\logs\service-wrapper.log
